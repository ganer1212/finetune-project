# pearlfortune — vhTOS 自定义矿工元数据 + 适配开关
# 改包内容后必须 bump VHTOS_VERSION（对应 HiveOS=CUSTOM_VERSION / mmpOS=EXTERNAL_VERSION）。
VHTOS_NAME=pearlfortune
VHTOS_VERSION=1.2.0

# ── 待 vhTOS 实测后确认 ──────────────────────────────────────────────
# stats schema：hiveos（默认）| mmpos
VHTOS_STATS_SCHEMA=hiveos
# 启动器 tee 的日志，vhtos-stats.sh 也读它
VHTOS_LOG_FILE=/tmp/pearlfortune-vhtos.log
# ────────────────────────────────────────────────────────────────────

# 可选 token：池端 enrollment 用；也可在 VHTOS_EXTRA 里写 TOKEN=xxx（会自动 --token 传入）
# VHTOS_TOKEN=

# 额外参数（KEY=VALUE→export，如 TOKEN=xxx / MINER_SUBMIT_VERSION=2；裸 flag→透传，如 --startup-bench）
# 等价 HiveOS 飞行表「其他参数」。
# VHTOS_EXTRA="--startup-bench"

# ── 配置注入兜底（仅当 vhTOS 既不走 CLI、也不走 VHTOS_*/CUSTOM_* env 时手填测试）──
# VHTOS_POOL=proxy.example.com:5860
# VHTOS_WALLET=prl1youraddresshere
# VHTOS_WORKER=rig01
